<script>
const platformData={ig:{followers:"142,300",views:"2.1M",engagement:"4.2%",posts:"14",fd:"+1,204 this wk",vd:"+340K vs last mo",ed:"+0.4%",pd:"+3"},tt:{followers:"89,600",views:"5.8M",engagement:"6.8%",posts:"22",fd:"+3,410 this wk",vd:"+1.2M vs last mo",ed:"+1.1%",pd:"+5"},yt:{followers:"61,200",views:"940K",engagement:"3.1%",posts:"6",fd:"+820 this wk",vd:"+120K vs last mo",ed:"-0.2%",pd:"+2"},pod:{followers:"28,400",views:"94K",engagement:"—",posts:"4",fd:"+560 this wk",vd:"+12K vs last mo",ed:"—",pd:"+1"}};

const metricKeys=["followers","views","engagement","posts"];
const metricDeltas=["fd","vd","ed","pd"];

function renderMetrics(p){
  const d=platformData[p];const isPod=p==="pod";
  const labels=isPod?["Subscribers","Downloads (30d)","","Eps this month"]:["Followers","Views (30d)","Avg engagement","Posts this month"];
  document.getElementById("metrics-grid").innerHTML=metricKeys.map((k,i)=>{
    const dval=d[metricDeltas[i]];
    const isNeg=dval&&dval.includes("-")&&!dval.includes("+");
    const hide=(isPod&&i===2);
    return`<div class="metric-box"${hide?' style="opacity:.35"':''}><div class="metric-label">${labels[i]}</div><div class="metric-val">${d[k]}</div><div class="metric-delta ${isNeg?'delta-down':'delta-up'}">${dval}</div></div>`;
  }).join("");
}

async function loadTwitterFollowers(){
  try{
    const res=await fetch("/api/social?handle=ultromics");
    const result=await res.json();
    const followers=result.data.legacy.followers_count;

    platformData.ig.followers=followers.toLocaleString();
    platformData.ig.fd="Live from X";

    renderMetrics("ig");
  }catch(error){
    console.error("Could not load followers:",error);
  }
}

const goals=[{label:"200K Instagram followers",pct:71},{label:"100K YouTube subscribers",pct:61},{label:"$150K annual revenue",pct:43},{label:"100K podcast downloads",pct:38},{label:"500K TikTok followers",pct:18}];

function renderGoals(){
  document.getElementById("goals-list").innerHTML=goals.map(g=>`<div class="goal-row"><div class="goal-meta"><span class="goal-name">${g.label}</span><span class="goal-pct">${g.pct}%</span></div><div class="bar-track"><div class="bar-fill" style="width:0%" data-pct="${g.pct}"></div></div></div>`).join("");
  setTimeout(()=>{document.querySelectorAll(".bar-fill").forEach(b=>{b.style.width=b.dataset.pct+"%"})},100);
}

const postsData={ig:[{title:"Morning routine reel",plat:"ig",views:"2.1M",likes:"84K"},{title:"What I eat in a day",plat:"ig",views:"890K",likes:"41K"},{title:"Quiet luxury home tour",plat:"ig",views:"540K",likes:"28K"},{title:"5AM wake-up challenge",plat:"ig",views:"320K",likes:"17K"},{title:"Spring capsule wardrobe",plat:"ig",views:"210K",likes:"9.8K"}],tt:[{title:"Get ready with me — Paris trip",plat:"tt",views:"1.8M",likes:"142K"},{title:"Duet: wellness with @val",plat:"tt",views:"800K",likes:"67K"},{title:"Honest skincare routine",plat:"tt",views:"450K",likes:"38K"},{title:"Slow morning vlog",plat:"tt",views:"310K",likes:"22K"},{title:"Books that changed my life",plat:"tt",views:"190K",likes:"15K"}],yt:[{title:"Quiet luxury home tour",plat:"yt",views:"400K",likes:"12K"},{title:"Reading vlog — slow week",plat:"yt",views:"210K",likes:"7.4K"},{title:"Honest brand deal review",plat:"yt",views:"145K",likes:"5.1K"},{title:"My creative business setup",plat:"yt",views:"98K",likes:"3.8K"},{title:"Spring declutter & reset",plat:"yt",views:"87K",likes:"3.2K"}],pod:[{title:"Ep. 84: Burnout & Boundaries",plat:"pod",views:"28K",likes:"—"},{title:"Ep. 83: Building in public",plat:"pod",views:"24K",likes:"—"},{title:"Ep. 82: Morning pages deep dive",plat:"pod",views:"21K",likes:"—"},{title:"Ep. 81: Money & mindset",plat:"pod",views:"19K",likes:"—"}]};

function renderPosts(p){
  const rows=postsData[p]||postsData.ig;
  const colors={ig:"#F5C4B3",tt:"#B4B2A9",yt:"#F09595",pod:"#AFA9EC"};
  const badge={ig:"badge-ig",tt:"badge-tt",yt:"badge-yt",pod:"badge-pod"};
  const label={ig:"Instagram",tt:"TikTok",yt:"YouTube",pod:"Podcast"};
  document.getElementById("posts-tbody").innerHTML=rows.map(r=>`<tr><td><div style="display:flex;align-items:center"><div class="thumb" style="background:${colors[r.plat]}">${r.plat.toUpperCase()}</div><span style="font-size:12px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.title}</span></div></td><td><span class="badge ${badge[r.plat]}">${label[r.plat]}</span></td><td style="color:var(--color-text-secondary)">${r.views}</td><td style="color:var(--color-text-secondary)">${r.likes}</td></tr>`).join("");
}

function switchPlatform(p,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  renderMetrics(p);
  renderPosts(p);
}

const briefings=["Strong week across all platforms. Your Instagram reel hit 2.1M plays — the algorithm is clearly favoring your content right now. You're 71% toward your follower goal and income is up 18% month-over-month. Three active brand deals are in flight, and BetterHelp renewals look likely. Keep the posting cadence going.","Your podcast is punching above its weight: Ep. 84 is your most downloaded ever and BetterHelp has already flagged renewal interest. TikTok continues to be your fastest-growing platform at +3,410 followers this week. Revenue is on track to hit your $150K annual goal if Q2 holds. Two pending deals need follow-up this week.","Community sentiment is high — the burnout episode is resonating deeply and driving meaningful follower growth across platforms. YouTube is your biggest growth opportunity: at 61K subscribers, you're 39K away from the 100K goal. Consider increasing long-form video cadence in May. Brand deal pipeline is healthy at $10K+ in active and pending value."];

let briefingIdx=0;

function refreshBriefing(){
  const el=document.getElementById("briefing-text");
  el.classList.add("fade");
  setTimeout(()=>{
    briefingIdx=(briefingIdx+1)%briefings.length;
    el.textContent=briefings[briefingIdx];
    el.classList.remove("fade");
  },400);
}

document.getElementById("briefing-text").textContent=briefings[0];

const now=new Date();
document.getElementById("date-chip").textContent=now.toLocaleDateString("en-US",{weekday:"short",month:"long",day:"numeric",year:"numeric"});

renderMetrics("ig");
renderGoals();
renderPosts("ig");
loadTwitterFollowers();
</script>
